# Pre-commit hooks for plasmid-priority
#
# This is a lightweight, practical pre-commit setup that improves repo hygiene
# without overwhelming the workflow. To use:
#   1. Install pre-commit: pip install pre-commit
#   2. Install hooks: pre-commit install
#   3. (Optional) Run on all files: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # General file hygiene
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key

      # Whitespace and formatting
      - id: trailing-whitespace
        exclude: '(\.tsv$|\.csv$)'
      - id: end-of-file-fixer
        exclude: '(\.tsv$|\.csv$)'
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      # Run the linter (matches pyproject.toml config)
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - "pydantic>=2.7"
          - "types-PyYAML>=6.0.12"
          - "numpy>=2.0"
          - "pandas-stubs>=2.2"
