name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    env:
      MPLBACKEND: Agg
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev,tree-models]"
          python -c "import lightgbm; print('LightGBM OK:', lightgbm.__version__)"

      - name: Compile Python sources
        run: python -m compileall -q src scripts tests

      - name: Protocol freshness gate
        run: make protocol-freshness

      - name: Runtime budget gate
        run: make runtime-budget-gate

      - name: Scientific contract gate
        run: make scientific-contract-gate

      - name: Artifact integrity gate
        run: make artifact-integrity

      - name: Release readiness gate
        run: make release-readiness

      - name: Import contract gate
        run: make import-contract

      - name: Lint (ruff)
        run: make lint

      - name: Type check (mypy)
        run: make typecheck

      - name: Run tests with coverage
        run: make test-cov

      - name: Critical-path coverage
        run: make critical-coverage

      - name: Security audit (pip-audit)
        run: make security

      - name: Smoke test
        run: make smoke

      - name: Docs build
        run: make docs-check

      - name: Quality gate
        run: make quality
