name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    env:
      MPLBACKEND: Agg
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analysis,dev,tree-models]"
          python -c "import lightgbm; print('LightGBM OK:', lightgbm.__version__)"

      - name: Compile Python sources
        run: python -m compileall -q src scripts tests

      - name: Protocol freshness gate
        run: make protocol-freshness

      - name: Runtime budget gate
        run: make runtime-budget-gate

      - name: Scientific contract gate
        run: make scientific-contract-gate

      - name: Artifact integrity gate
        run: make artifact-integrity

      - name: Release readiness gate
        run: make release-readiness

      - name: Import contract gate
        run: make import-contract

      - name: Lint (ruff)
        run: make lint

      - name: Type check (mypy)
        run: make typecheck

      - name: Run tests with coverage
        run: make test-cov

      - name: Critical-path coverage
        run: |
          python -m coverage erase
          python -m coverage run --source=src/plasmid_priority -m pytest -q \
            tests/test_temporal_contracts.py \
            tests/test_probabilistic_labels.py \
            tests/test_modeling_temporal_cv.py \
            tests/test_leakage.py \
            tests/test_config.py \
            tests/test_model_caches.py \
            -o addopts=''
          python -m coverage report \
            --include='src/plasmid_priority/shared/temporal.py,src/plasmid_priority/labels/probabilistic.py,src/plasmid_priority/modeling/temporal_cv.py,src/plasmid_priority/config.py' \
            --fail-under=90 \
            --show-missing

      - name: Security audit (pip-audit)
        run: make security

      - name: Smoke test
        run: make smoke

      - name: Quality gate
        run: make quality
