site_name: Plasmid Priority API Reference
site_description: Retrospective genomic surveillance prioritization framework
site_url: https://plasmid-priority.readthedocs.io
repo_url: https://github.com/umutkeskin1001/plasmid-priority
repo_name: umutkeskin1001/plasmid-priority

theme:
  name: material
  palette:
    primary: indigo
    accent: teal
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_category_heading: true

not_in_nav: |
  JURY_SUMMARY.md
  SOTA_TECHNICAL_PLAN.md
  benchmark_contract.md
  data_card.md
  data_cleaning_contract.md
  disposition_ledger.md
  final_project_ascension_plan.md
  label_card_bundle.md
  macos_compatibility.md
  model_card.md
  plugins.md
  pre_registration.md
  scientific_protocol.md
  runbooks/ci_failure_triage.md
  runbooks/jury_presentation.md
  runbooks/model_update.md
  runbooks/new_data_source.md
  superpowers/plans/*

nav:
  - Home: index.md
  - Runbooks:
    - Deployment and rollback: runbooks/deployment.md
    - Release verification: runbooks/release_verification.md
    - Quality scoreboard: runbooks/quality_scoreboard.md
    - Scientific invariants: runbooks/scientific_invariants.md
    - Security: runbooks/security.md
    - Demo path: runbooks/demo_path.md
  - Stakeholder Overviews:
    - Scientific overview: scientific_overview.md
    - CTO overview: cto_overview.md
    - Investor overview: investor_overview.md
    - Product strategy: product_strategy.md
  - API Reference:
    - exceptions: api/exceptions.md
    - logging_utils: api/logging_utils.md
    - config: api/config.md
    - features:
      - core: api/features/core.md
      - transfer: api/features/transfer.md
      - host_range: api/features/host_range.md
      - amr: api/features/amr.md
    - shared:
      - specs: api/shared/specs.md
      - branching: api/shared/branching.md
      - calibration: api/shared/calibration.md
      - contracts: api/shared/contracts.md
    - validation:
      - schemas: api/validation/schemas.md
      - metrics: api/validation/metrics.md
      - missingness: api/validation/missingness.md
    - modeling:
      - module_a: api/modeling/module_a.md
      - ensemble_strategies: api/modeling/ensemble_strategies.md
