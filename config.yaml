# Plasmid Priority Global Configuration

pipeline:
  split_year: 2015
  min_new_countries_for_spread: 3

models:
  primary_model_name: "support_synergy_priority"
  primary_model_fallback: "support_calibrated_priority"
  conservative_model_name: "bio_clean_priority"

  core_model_names:
    - "baseline_member_count"
    - "baseline_country_count"
    - "baseline_both"
    - "full_priority"
    - "source_only"
    - "bio_clean_priority"
    - "parsimonious_priority"
    - "natural_auc_priority"
    - "phylogeny_aware_priority"
    - "structured_signal_priority"
    - "ecology_clinical_priority"
    - "knownness_robust_priority"
    - "support_calibrated_priority"
    - "support_synergy_priority"
    - "host_transfer_synergy_priority"
    - "threat_architecture_priority"

  research_model_names:
    - "balanced_evidence_priority"
    - "visibility_adjusted_priority"
    - "contextual_bio_priority"
    - "evidence_aware_priority"
    - "proxy_light_priority"
    - "enhanced_priority"

  ablation_model_names:
    - "T_only"
    - "H_only"
    - "A_only"
    - "T_plus_H"
    - "T_plus_A"
    - "H_plus_A"
    - "T_plus_H_plus_A"

  feature_sets:
    baseline_member_count: ["log1p_member_count_train"]
    baseline_country_count: ["log1p_n_countries_train"]
    baseline_both: ["log1p_member_count_train", "log1p_n_countries_train"]
    full_priority: ["log1p_member_count_train", "log1p_n_countries_train", "priority_index"]
    bio_clean_priority: ["T_raw_norm", "H_specialization_norm", "A_raw_norm", "orit_support"]
    balanced_evidence_priority: ["T_raw_norm", "H_breadth_norm", "A_raw_norm", "coherence_score", "orit_support", "amr_support_norm", "H_support_norm"]
    visibility_adjusted_priority: ["T_raw_norm", "H_specialization_norm", "A_raw_norm", "orit_support", "H_support_norm_residual"]
    parsimonious_priority: ["T_eff_norm", "H_specialization_norm", "A_eff_norm", "coherence_score"]
    natural_auc_priority: ["T_eff_norm", "H_specialization_norm", "A_eff_norm", "coherence_score", "H_external_host_range_norm", "backbone_purity_norm", "assignment_confidence_norm", "mash_neighbor_distance_train_norm", "replicon_architecture_norm"]
    phylogeny_aware_priority: ["T_eff_norm", "H_phylogenetic_specialization_norm", "A_eff_norm", "coherence_score", "H_external_host_range_norm", "backbone_purity_norm", "assignment_confidence_norm", "mash_neighbor_distance_train_norm", "replicon_architecture_norm"]
    structured_signal_priority: ["T_eff_norm", "H_phylogenetic_specialization_norm", "host_taxon_evenness_norm", "A_eff_norm", "A_recurrence_norm", "coherence_score", "H_external_host_range_norm", "backbone_purity_norm", "assignment_confidence_norm", "mash_neighbor_distance_train_norm", "replicon_architecture_norm"]
    ecology_clinical_priority: ["T_eff_norm", "H_specialization_norm", "A_eff_norm", "coherence_score", "H_external_host_range_norm", "backbone_purity_norm", "assignment_confidence_norm", "mash_neighbor_distance_train_norm", "replicon_architecture_norm", "clinical_context_fraction_norm", "ecology_context_diversity_norm"]
    knownness_robust_priority: ["T_eff_norm", "H_specialization_norm", "A_eff_norm", "coherence_score", "backbone_purity_norm", "assignment_confidence_norm", "mash_neighbor_distance_train_norm", "replicon_architecture_norm", "clinical_context_fraction_norm", "A_recurrence_norm", "pmlst_coherence_norm", "ecology_context_diversity_norm"]
    support_calibrated_priority: ["T_eff_norm", "H_specialization_norm", "A_eff_norm", "coherence_score", "backbone_purity_norm", "assignment_confidence_norm", "mash_neighbor_distance_train_norm", "replicon_architecture_norm", "clinical_context_fraction_norm", "A_recurrence_norm", "pmlst_coherence_norm", "ecology_context_diversity_norm", "H_external_host_range_support", "pmlst_presence_fraction_train", "amr_support_norm"]
    support_synergy_priority: ["T_eff_norm", "H_specialization_norm", "A_eff_norm", "coherence_score", "backbone_purity_norm", "assignment_confidence_norm", "mash_neighbor_distance_train_norm", "replicon_architecture_norm", "clinical_context_fraction_norm", "A_recurrence_norm", "pmlst_coherence_norm", "ecology_context_diversity_norm", "H_external_host_range_support", "pmlst_presence_fraction_train", "amr_support_norm", "metadata_support_depth_norm", "H_external_host_range_norm", "external_t_synergy_norm", "T_A_synergy_norm", "H_A_synergy_norm", "clinical_A_synergy_norm"]
    host_transfer_synergy_priority: ["T_eff_norm", "H_specialization_norm", "A_eff_norm", "coherence_score", "backbone_purity_norm", "assignment_confidence_norm", "mash_neighbor_distance_train_norm", "replicon_architecture_norm", "clinical_context_fraction_norm", "A_recurrence_norm", "pmlst_coherence_norm", "ecology_context_diversity_norm", "H_external_host_range_norm", "external_t_synergy_norm"]
    threat_architecture_priority: ["T_eff_norm", "H_specialization_norm", "A_eff_norm", "coherence_score", "backbone_purity_norm", "assignment_confidence_norm", "mash_neighbor_distance_train_norm", "replicon_architecture_norm", "clinical_context_fraction_norm", "A_recurrence_norm", "pmlst_coherence_norm", "ecology_context_diversity_norm", "H_external_host_range_norm", "external_t_synergy_norm", "amr_clinical_threat_norm", "mean_n_replicon_types_norm"]
    contextual_bio_priority: ["T_eff_norm", "H_specialization_norm", "A_eff_norm", "coherence_score", "H_external_host_range_norm", "backbone_purity_norm", "assignment_confidence_norm", "replicon_architecture_norm", "pmlst_coherence_norm", "ecology_context_diversity_norm", "clinical_context_fraction_norm", "pathogenic_context_fraction_norm"]
    evidence_aware_priority: ["T_raw_norm", "support_shrinkage_norm", "amr_support_norm", "coherence_score", "orit_support"]
    proxy_light_priority: ["T_eff_norm", "H_eff_norm", "A_eff_norm", "coherence_score", "orit_support"]
    enhanced_priority: ["log1p_member_count_train", "log1p_n_countries_train", "T_eff_norm", "H_eff_norm", "A_eff_norm", "coherence_score", "orit_support"]
    T_only: ["T_eff_norm"]
    H_only: ["H_eff_norm"]
    A_only: ["A_eff_norm"]
    T_plus_H: ["T_eff_norm", "H_eff_norm"]
    T_plus_A: ["T_eff_norm", "A_eff_norm"]
    H_plus_A: ["H_eff_norm", "A_eff_norm"]
    T_plus_H_plus_A: ["T_eff_norm", "H_eff_norm", "A_eff_norm"]
    source_only: ["refseq_share_train"]

  fit_config:
    visibility_adjusted_priority: {l2: 3.0, sample_weight_mode: "source_balanced"}
    bio_clean_priority: {l2: 2.5, sample_weight_mode: "source_balanced"}
    parsimonious_priority: {l2: 2.5, sample_weight_mode: "source_balanced"}
    natural_auc_priority: {l2: 3.0, sample_weight_mode: "source_balanced"}
    phylogeny_aware_priority: {l2: 3.0, sample_weight_mode: "source_balanced"}
    structured_signal_priority: {l2: 3.5, sample_weight_mode: "source_balanced"}
    ecology_clinical_priority: {l2: 4.0, sample_weight_mode: "source_balanced"}
    knownness_robust_priority: {l2: 5.0, sample_weight_mode: "class_balanced+knownness_balanced"}
    support_calibrated_priority: {l2: 7.0, sample_weight_mode: "class_balanced+knownness_balanced"}
    support_synergy_priority: {l2: 1.0, sample_weight_mode: "class_balanced+knownness_balanced"}
    host_transfer_synergy_priority: {l2: 6.0, sample_weight_mode: "class_balanced+knownness_balanced"}
    threat_architecture_priority: {l2: 5.5, sample_weight_mode: "class_balanced+knownness_balanced"}
    contextual_bio_priority: {l2: 3.5, sample_weight_mode: "source_balanced"}
    balanced_evidence_priority: {l2: 3.0, sample_weight_mode: "source_balanced"}

  novelty_specialist:
    features: ["T_eff_norm", "A_raw_norm", "A_eff_norm", "orit_support", "H_specialization_norm", "replicon_architecture_norm", "mash_neighbor_distance_train_norm", "clinical_context_sparse_penalty_norm", "external_t_synergy_norm"]
    fit_config: {l2: 3.5, sample_weight_mode: null}
