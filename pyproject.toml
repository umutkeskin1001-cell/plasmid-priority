[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "plasmid-priority"
version = "0.1.0"
description = "Retrospective genomic surveillance prioritization for operational plasmid backbone classes."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "numpy>=2.0",
  "pandas>=2.2",
  "pydantic>=2.7",
  "pyyaml>=6",
  "scikit-learn>=1.5",
  "scipy>=1.13",
]

[project.optional-dependencies]
analysis = [
  "matplotlib>=3.10",
  "pyarrow>=16",
  "snakemake>=8",
]
dev = [
  "pytest>=8",
]

[tool.setuptools.packages.find]
where = ["src"]
